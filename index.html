<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberGym AI | Hardcore Training</title>
    <style>
        :root {
            --danger-red: #ff0000;
            --warning-yellow: #ffcc00;
            --dark-black: #050505;
            --card-bg: #111111;
            --text-white: #eeeeee;
        }

        body {
            font-family: 'Black Ops One', cursive, 'Arial Black', sans-serif;
            background-color: var(--dark-black);
            color: var(--text-white);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        header {
            padding: 50px 20px;
            text-align: center;
            border-bottom: 3px solid var(--danger-red);
            width: 100%;
            box-sizing: border-box;
            background: linear-gradient(to bottom, #1a0000, var(--dark-black));
        }

        h1 {
            color: var(--danger-red);
            text-transform: uppercase;
            font-size: 3rem;
            margin: 0;
            text-shadow: 2px 2px 0px var(--warning-yellow);
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 5px;
            border: 2px solid var(--danger-red);
            width: 90%;
            max-width: 500px;
            margin-top: 30px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: var(--warning-yellow);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--danger-red);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid var(--danger-red);
            color: white;
            border-radius: 3px;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--warning-yellow);
            box-shadow: 0 0 10px var(--warning-yellow);
        }

        button {
            width: 100%;
            padding: 18px;
            background-color: var(--danger-red);
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
        }

        button:hover {
            background-color: black;
            color: var(--danger-red);
            border: 2px solid var(--danger-red);
            box-shadow: 0 0 20px var(--danger-red);
        }

        #result {
            margin-top: 30px;
            padding: 20px;
            border: 2px dashed var(--warning-yellow);
            background: rgba(255, 204, 0, 0.05);
            display: none;
            line-height: 1.6;
        }

        .ai-status {
            color: var(--warning-yellow);
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>

<header>
    <h1>CyberGym AI</h1>
    <p style="color: var(--warning-yellow);">PROTOKÓŁ TRENINGOWY v2.0 // NIE MA WYMÓWEK</p>
</header>

<div class="container">
    <div class="form-group">
        <label>Poziom wycieńczenia (1-10)</label>
        <input type="range" id="fatigue" min="1" max="10" value="3">
        <div style="display: flex; justify-content: space-between; font-size: 11px; color: #888;">
            <span>GOTOWY NA WOJNĘ</span>
            <span>WRAK CZŁOWIEKA</span>
        </div>
    </div>

    <div class="form-group">
        <label>Co Cię dzisiaj boli?</label>
        <input type="text" id="pain" placeholder="np. kolano, dolny grzbiet...">
    </div>

    <div class="form-group">
        <label>Twój cel na dziś? (Zostaw puste dla decyzji AI)</label>
        <input type="text" id="wish" placeholder="np. klatka, plecy, biceps...">
    </div>

    <button onclick="generatePlan()">URUCHOM GENERATOR PLANU</button>

    <div id="result"></div>
</div>

<script>
function generatePlan() {
    const fatigue = document.getElementById('fatigue').value;
    const pain = document.getElementById('pain').value.toLowerCase();
    const wish = document.getElementById('wish').value.toLowerCase();
    const resultDiv = document.getElementById('result');

    resultDiv.style.display = 'block';
    resultDiv.innerHTML = "<span class='ai-status'>SKANOWANIE SYSTEMU... OBLICZANIE OBJĘTOŚCI TRENINGOWEJ...</span>";

    setTimeout(() => {
        let plan = "<strong style='color: var(--danger-red); font-size: 1.2rem;'>RAPORT TRENINGOWY:</strong><br><br>";

        // Ustalanie parametrów na podstawie zmęczenia
        let sets = "4";
        let reps = "8-10";
        if (fatigue >= 5) { sets = "3"; reps = "12-15"; } // Lżejszy trening przy zmęczeniu
        if (fatigue >= 8) { sets = "2"; reps = "15-20"; } // Bardzo lekki przy dużym zmęczeniu

        if (fatigue >= 9) {
            plan += "🚨 <strong>KRYTYCZNE ZMĘCZENIE!</strong><br>System odmawia generowania planu siłowego. <br>Zalecenie: 30 min rozciągania i sen. Jutro będziesz silniejszy.";
        } else {
            // Analiza bólu i dobór ćwiczeń
            let exercises = [];
            
            if (pain.includes("noga") || pain.includes("kolan")) {
                plan += "⚠️ <strong>ALARM:</strong> Kontuzja dołu ciała. Blokada nóg.<br>";
                exercises = [
                    `Wyciskanie sztangi leżąc: ${sets} serie x ${reps}`,
                    `Podciąganie na drążku: ${sets} serie x max`,
                    `Wyciskanie hantli nad głowę: ${sets} serie x 12`,
                    `Uginanie ramion (Biceps): 3 serie x 15`
                ];
            } else if (pain.includes("plecy") || pain.includes("kręgosłup")) {
                plan += "⚠️ <strong>ALARM:</strong> Stabilizacja kręgosłupa priorytetem.<br>";
                exercises = [
                    `Wyprosty nóg na maszynie: ${sets} serie x 15`,
                    `Uginanie nóg leżąc: ${sets} serie x 15`,
                    `Wyciskanie na maszynie (Klatka): ${sets} serie x 12`,
                    `Plank (Deska): 3 serie x 45 sek`
                ];
            } else {
                plan += "🔥 <strong>STATUS:</strong> Pełna gotowość bojowa.<br>";
                if (wish.includes("klat") || wish.includes("push")) {
                    exercises = [
                        `Wyciskanie na ławce: ${sets} serie x ${reps}`,
                        `Rozpiętki: 3 serie x 12`,
                        `Dipsy (Pompki na poręczach): ${sets} serie x 10`,
                        `Triceps (Linki): 3 serie x 15`
                    ];
                } else if (wish.includes("plecy") || wish.includes("pull")) {
                    exercises = [
                        `Martwy ciąg: ${sets} serie x 5`,
                        `Wiosłowanie sztangą: ${sets} serie x 10`,
                        `Podciąganie: 3 serie x max`,
                        `Facepulls: 3 serie x 20`
                    ];
                } else {
                    // Domyślny FBW jeśli nic nie wpisano lub coś innego
                    exercises = [
                        `Przysiad ze sztangą: ${sets} serie x 8`,
                        `Wyciskanie hantli: ${sets} serie x 10`,
                        `Wiosłowanie hantlem: ${sets} serie x 12`,
                        `Wznosy bokiem: 3 serie x 15`
                    ];
                }
            }

            plan += "<br><strong>LISTA ĆWICZEŃ:</strong><br>";
            exercises.forEach(ex => {
                plan += `• ${ex}<br>`;
            });

            if (wish === "") {
                plan += "<br>🤖 <em>AI wybrało trening ogólnorozwojowy (FBW).</em>";
            } else {
                plan += `<br>🎯 <em>Cel: ${wish.toUpperCase()} uwzględniony w rozpisce.</em>`;
            }
        }

        resultDiv.innerHTML = plan;
    }, 1200);
}
</script>
