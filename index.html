<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberGym AI | System Treningowy</title>
    <style>
        :root { 
            --danger-red: #ff0000; 
            --warning-yellow: #ffcc00; 
            --dark-black: #050505; 
            --text-white: #ffffff; 
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--dark-black); 
            color: var(--text-white); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
        }

        /* Modal Regulaminu */
        #regModal { 
            position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; 
        }
        .modal-content { 
            background: #1a1a1a; padding: 40px; border: 2px solid var(--danger-red); 
            text-align: center; max-width: 500px; border-radius: 10px; 
        }
        
        .main-content { 
            display: none; padding: 20px; width: 100%; max-width: 500px; text-align: center; 
        }

        h1 { color: var(--danger-red); text-transform: uppercase; letter-spacing: 2px; }
        
        label { 
            display: block; margin: 15px 0 5px; color: var(--warning-yellow); 
            font-weight: bold; text-align: left; font-size: 0.9rem;
        }
        
        button { 
            padding: 15px 25px; background: var(--danger-red); border: none; 
            color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; 
            margin: 10px; transition: 0.3s; 
        }
        button:hover { background: var(--warning-yellow); color: black; }

        input[type="text"], input[type="range"] { 
            width: 100%; padding: 12px; margin-bottom: 10px; box-sizing: border-box; 
            background: #222; border: 1px solid var(--danger-red); color: white; 
        }
        
        #trainerUI { display: none; margin-top: 20px; text-align: left; }
        #result { 
            margin-top: 20px; padding: 15px; border: 1px dashed var(--warning-yellow); 
            background: #111; line-height: 1.6; font-size: 1rem;
        }
    </style>
</head>
<body>

<div id="regModal">
    <div class="modal-content">
        <h2>REGULAMIN CYBERGYM AI</h2>
        <p>1. Trenujesz na własną odpowiedzialność.<br>2. System AI nie odpowiada za Twoje rekordy.<br>3. Brak wymówek – akceptujesz zasady?</p>
        <button onclick="acceptRules()">AKCEPTUJĘ</button>
    </div>
</div>

<div id="mainContent" class="main-content">
    <h1>CyberGym AI</h1>
    <p>PROTOKÓŁ TRENINGOWY v3.0</p>
    
    <div class="gender-select">
        <label style="text-align: center;">WYBIERZ PŁEĆ:</label>
        <button onclick="selectGender('Mężczyzna')">MĘŻCZYŹNA</button>
        <button onclick="selectGender('Kobieta')">KOBIETA</button>
    </div>
    
    <div id="trainerUI">
        <label>POZIOM WYCIEŃCZENIA (1-10)</label>
        <input type="range" id="fatigue" min="1" max="10" value="3">
        
        <label>CO CIĘ DZISIAJ BOLI?</label>
        <input type="text" id="pain" placeholder="np. kolano, plecy...">
        
        <label>CEL TRENINGOWY (OPCJONALNIE)</label>
        <input type="text" id="wish" placeholder="np. klata, nogi, cardio...">
        
        <button onclick="generatePlan()" style="width: 100%;">GENERUJ PLAN</button>
        <div id="result"></div>
    </div>
</div>

<script>
    function acceptRules() { 
        document.getElementById('regModal').style.display = 'none'; 
        document.getElementById('mainContent').style.display = 'flex'; 
    }
    
    function selectGender(gender) { 
        document.getElementById('trainerUI').style.display = 'block'; 
        alert("System ustawiony na profil: " + gender); 
    }

    function generatePlan() {
        const fatigue = document.getElementById('fatigue').value;
        const pain = document.getElementById('pain').value.toLowerCase();
        const wish = document.getElementById('wish').value.toLowerCase();
        const resultDiv = document.getElementById('result');
        
        let sets = (fatigue >= 6) ? "3" : "4";
        let reps = (fatigue >= 6) ? "12-15" : "8-10";
        
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = "Analizowanie parametrów...";

        setTimeout(() => {
            let exercises = [];
            if (fatigue >= 9) {
                resultDiv.innerHTML = "🚨 <strong>KRYTYCZNE ZMĘCZENIE!</strong> System odmawia treningu. <br>Zalecenie: Odpoczynek.";
            } else {
                if (pain.includes("noga") || pain.includes("kolan")) {
                    exercises = [`Wyciskanie sztangi: ${sets} x ${reps}`, `Podciąganie: ${sets} x Max`, `Wyciskanie hantli (barki): 3 x 12`, `Wiosłowanie hantlem: 3 x 10`, `Dipsy: 3 x 12`, `Biceps sztanga: 3 x 15`, `Plank: 3 x 60s`];
                } else if (wish.includes("klata")) {
                    exercises = [`Wyciskanie płasko: ${sets} x ${reps}`, `Wyciskanie skos: ${sets} x 10`, `Rozpiętki: 3 x 15`, `Pompki poręcze: 3 x Max`, `Skullcrushers: 3 x 12`, `Linki triceps: 3 x 15`, `Bieżnia: 10min`];
                } else {
                    exercises = [`Przysiad: ${sets} x ${reps}`, `Wyciskanie barki: ${sets} x 10`, `Martwy ciąg: ${sets} x 8`, `Wyciskanie hantli: ${sets} x 10`, `Wiosłowanie: 3 x 12`, `Superseria Biceps/Triceps: 3 x 15`, `Wznosy nóg: 3 x 20`];
                }
                resultDiv.innerHTML = "<strong>PLAN TRENINGOWY:</strong><br><br>" + exercises.map(ex => `• ${ex}`).join("<br>");
            }
        }, 1000);
    }
</script>

</body>
</html>
