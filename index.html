<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberGym AI | System Treningowy</title>
    <style>
        :root { --danger-red: #ff0000; --warning-yellow: #ffcc00; --dark-black: #050505; --text-white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark-black); color: var(--text-white); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .main-content { padding: 20px; width: 100%; max-width: 800px; text-align: center; }
        h1 { color: var(--danger-red); text-transform: uppercase; letter-spacing: 2px; }
        label { display: block; margin: 15px 0 5px; color: var(--warning-yellow); font-weight: bold; text-align: left; }
        button { padding: 15px 25px; background: var(--danger-red); border: none; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 10px; }
        input[type="text"], input[type="range"] { width: 100%; padding: 12px; margin-bottom: 10px; background: #222; border: 1px solid var(--danger-red); color: white; }
        #trainerUI { display: none; margin-top: 20px; text-align: left; }
        #result { margin-top: 20px; padding: 20px; border: 1px dashed var(--warning-yellow); background: #111; }
        .exercise-item { margin-bottom: 40px; border-bottom: 1px solid #444; padding-bottom: 20px; }
    </style>
</head>
<body>

<div id="mainContent" class="main-content">
    <h1>CyberGym AI</h1>
    <div class="gender-select">
        <label>WYBIERZ PŁEĆ:</label>
        <button onclick="setGender('Mężczyzna')">MĘŻCZYŹNA</button>
        <button onclick="setGender('Kobieta')">KOBIETA</button>
    </div>
    
    <div id="trainerUI">
        <label>POZIOM WYCIEŃCZENIA (1-10)</label>
        <input type="range" id="fatigue" min="1" max="10" value="3">
        <label>CO CIĘ DZISIAJ BOLI?</label>
        <input type="text" id="pain" placeholder="np. kolano, plecy...">
        <button onclick="generatePlan()" style="width: 100%;">GENERUJ PLAN</button>
        <div id="result"></div>
    </div>
</div>

<script>
    let selectedGender = "Mężczyzna";
    const db = {
        "Przysiad ze sztangą": { v: "https://www.youtube.com/embed/DzM8glUTxDc", a: "SzostakTV" },
        "Wyciskanie sztangi płasko": { v: "https://www.youtube.com/embed/Yez7TTi7VWM", a: "KFD" },
        "Martwy ciąg klasyczny": { v: "https://www.youtube.com/embed/_qyZ1QaYy2w", a: "Total Fitness" },
        "Wiosłowanie sztangą": { v: "https://www.youtube.com/embed/4R0zm6kZ0Kc", a: "FitRepublic" },
        "Podciąganie": { v: "https://www.youtube.com/embed/LkLAIT--o0g", a: "tomczeskiworkout8098" },
        "Plank (Deska)": { v: "https://www.youtube.com/embed/pSHjTRCQxIw", a: "ScottHermanFitness" },
        "Wyprosty nóg": { v: "https://www.youtube.com/embed/Yez7TTi7VWM", a: "Fit Academy" }
    };

    function setGender(g) { selectedGender = g; document.getElementById('trainerUI').style.display = 'block'; }

    function generatePlan() {
        const fatigue = parseInt(document.getElementById('fatigue').value);
        const pain = document.getElementById('pain').value.toLowerCase();
        const res = document.getElementById('result');
        
        // Logika obciążenia (im wyższe zmęczenie, tym mniej serii)
        let sets = (fatigue >= 8) ? "2" : (fatigue >= 5 ? "3" : "4");
        let reps = (selectedGender === "Kobieta") ? "15-20" : "8-10";

        let plan = [];
        
        // Logika bólu
        if (pain.includes("kolan") || pain.includes("noga")) {
            plan = ["Wyciskanie sztangi płasko", "Wiosłowanie sztangą", "Podciąganie", "Plank (Deska)"];
        } else {
            plan = ["Przysiad ze sztangą", "Wyciskanie sztangi płasko", "Martwy ciąg klasyczny", "Wiosłowanie sztangą", "Podciąganie", "Plank (Deska)"];
        }

        let html = `<strong>PLAN (Płeć: ${selectedGender}, Zmęczenie: ${fatigue}/10)</strong><br><br>`;
        plan.forEach(name => {
            const data = db[name];
            html += `<div class='exercise-item'>
                        <strong>${name}</strong><br>
                        Serie: ${sets} | Powtórzenia: ${reps}<br>
                        <iframe width="100%" height="400" src="${data.v}" frameborder="0" allowfullscreen></iframe>
                        <div class='author-tag'>Autor: ${data.a}</div>
                     </div>`;
        });
        res.innerHTML = html;
    }
</script>
</body>
</html>
